<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas VA Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        /* Custom scrollbar for chat */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen w-screen p-4 flex gap-4 overflow-hidden font-sans">

    <div class="w-1/3 bg-gray-800 rounded-xl shadow-lg border border-gray-700 flex flex-col">
        <div class="p-4 border-b border-gray-700 bg-gray-800 rounded-t-xl">
            <h2 class="text-xl font-bold text-blue-400">Atlas Communication</h2>
        </div>
        
        <div id="chat-history" class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="bg-blue-900/30 border border-blue-800 p-3 rounded-lg text-sm text-blue-200">
                System initialized. Waiting for input...
            </div>
        </div>

        <div class="p-4 border-t border-gray-700 bg-gray-800 rounded-b-xl">
            <div class="flex gap-2 items-center">
                <input type="text" id="user-input" class="flex-1 bg-gray-700 text-white rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Type a command...">
                
                <div class="flex flex-col items-center group">
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="llm-toggle" class="sr-only peer">
                        <div class="w-10 h-5 bg-gray-600 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-500"></div>
                    </label>
                    <span class="text-[10px] font-bold text-gray-500 mt-1 uppercase tracking-tighter group-hover:text-blue-400 transition">LLM</span>
                </div>

                <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded font-semibold transition h-full">
                    Send
                </button>
            </div>
        </div>
    </div>

    <div class="w-2/3 flex flex-col gap-4">
        
        <div class="flex gap-4 h-16">
            <div id="lock-status" class="flex-1 rounded-xl flex items-center justify-center font-bold text-lg shadow-md bg-red-600 text-white transition-colors duration-300">
                <i data-feather="lock" class="w-5 h-5 mr-2"></i>
                <span>System Locked</span>
            </div>
            <div id="listen-status" class="flex-1 rounded-xl flex items-center justify-center font-bold text-lg shadow-md bg-yellow-500 text-gray-900 transition-colors duration-300 cursor-pointer hover:opacity-90" onclick="toggleMicStreaming()">
                <i data-feather="mic-off" class="w-5 h-5 mr-2"></i>
                <span>Not Listening</span>
            </div>
        </div>

        <div class="h-64 bg-gray-800 rounded-xl shadow-lg border border-gray-700 p-4 flex gap-4">
            <div id="weather-box" class="flex-1 bg-gray-700/50 rounded flex flex-col items-center justify-evenly border border-gray-600 p-4 transition-all duration-700">
                <h3 class="text-xs font-bold text-gray-500 uppercase tracking-[0.2em]">Environment Status</h3>
                
                <i id="weather-icon" data-feather="cloud" class="w-20 h-20 transition-colors duration-700"></i>
                
                <div class="text-center">
                    <span id="weather-desc" class="block text-gray-100 text-2xl font-black uppercase leading-none">
                        Open-Meteo API
                    </span>
                    
                    <span id="weather-location" class="block text-gray-400 text-sm font-bold uppercase tracking-widest mt-2">
                        Waiting for data
                    </span>
                </div>
            </div>
            
            <div id="timer-display" class="flex-1 bg-gray-700/50 rounded p-4 border border-gray-600 flex flex-col">
                <h3 class="text-sm font-bold text-blue-400 mb-2 border-b border-gray-600 pb-1">Active Timers</h3>
                <div id="timer-list" class="flex-1 overflow-y-auto text-base text-gray-200">
                    No active timers.
                </div>
            </div>
        </div>

        <div class="flex-1 bg-gray-800 rounded-xl shadow-lg border border-gray-700 p-4 flex flex-col min-h-0">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-lg font-bold text-green-400 tracking-tighter">Garden Control System</h2>
            </div>
            <div class="flex-1 bg-gray-900 rounded border border-gray-700 flex items-center justify-center overflow-hidden relative">
                <img id="game-render" src="" alt="Garden Map" class="max-w-full max-h-full object-contain hidden">
                <span id="no-render-text" class="text-gray-500 italic">Standby - Waiting for Engine Update</span>
            </div>
        </div>
    </div>

    <script>
        const chatHistory = document.getElementById('chat-history');
        const userInput = document.getElementById('user-input');
        const gameRender = document.getElementById('game-render');
        const noRenderText = document.getElementById('no-render-text');
        const listenStatusDiv = document.getElementById('listen-status');
        
        let activeTimers = [];

        let isMicStreaming = false;
        let micMediaStream = null;
        let micRecorder = null;
        let micUploadChain = Promise.resolve();

        // Allow Enter key to send
        userInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") sendMessage();
        });

        function renderFeatherIcons() {
            if (window.feather && typeof window.feather.replace === 'function') {
                window.feather.replace();
            }
        }

        function setListeningState(streaming) {
            if (!listenStatusDiv) return;

            if (streaming) {
                listenStatusDiv.className = "flex-1 rounded-xl flex items-center justify-center font-bold text-lg shadow-md bg-green-500 text-white transition-colors duration-300 cursor-pointer hover:opacity-90";
                listenStatusDiv.innerHTML = '<i data-feather="mic" class="w-5 h-5 mr-2"></i><span>Listening...</span>';
            } else {
                listenStatusDiv.className = "flex-1 rounded-xl flex items-center justify-center font-bold text-lg shadow-md bg-yellow-500 text-gray-900 transition-colors duration-300 cursor-pointer hover:opacity-90";
                listenStatusDiv.innerHTML = '<i data-feather="mic-off" class="w-5 h-5 mr-2"></i><span>Not Listening</span>';
            }

            renderFeatherIcons();
        }

        async function uploadAudioChunk(blob) {
            if (!blob || blob.size === 0) return;

            const form = new FormData();
            form.append('audio', blob, 'chunk.webm');

            const response = await fetch('/verification/audiostream', {
                method: 'POST',
                body: form
            });

            if (!response.ok) {
                let errorText = `HTTP ${response.status} from server`;
                try {
                    const data = await response.json();
                    if (data && data.error) errorText = data.error;
                } catch (_) {}
                throw new Error(errorText);
            }

            return response.json();
        }

        function queueAudioUpload(blob) {
            micUploadChain = micUploadChain
                .then(() => uploadAudioChunk(blob))
                .catch((err) => {
                    console.error('Mic upload error:', err);
                });
        }

        async function startMicStreaming() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                appendMessage('System', 'Error: Microphone is not supported in this browser.');
                return;
            }
            if (!window.MediaRecorder) {
                appendMessage('System', 'Error: MediaRecorder is not supported in this browser.');
                return;
            }

            micMediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });

            const preferredMimeTypes = [
                'audio/webm;codecs=opus',
                'audio/webm'
            ];
            const selectedMimeType = preferredMimeTypes.find(t => MediaRecorder.isTypeSupported(t));
            micRecorder = selectedMimeType ? new MediaRecorder(micMediaStream, { mimeType: selectedMimeType }) : new MediaRecorder(micMediaStream);

            micRecorder.ondataavailable = (event) => {
                if (!event.data) return;
                queueAudioUpload(event.data);
            };

            micRecorder.onerror = (event) => {
                console.error('Mic recorder error:', event);
            };

            micRecorder.onstop = () => {
                if (micMediaStream) {
                    micMediaStream.getTracks().forEach(t => t.stop());
                }
                micMediaStream = null;
                micRecorder = null;
            };

            isMicStreaming = true;
            setListeningState(true);

            // Start recording and emit chunks periodically (live feed)
            micRecorder.start(1000);
        }

        function stopMicStreaming() {
            isMicStreaming = false;
            setListeningState(false);

            try {
                if (micRecorder && micRecorder.state !== 'inactive') {
                    micRecorder.stop();
                }
            } catch (err) {
                console.error('Failed to stop mic recorder:', err);
            }

            if (micMediaStream) {
                micMediaStream.getTracks().forEach(t => t.stop());
                micMediaStream = null;
            }
        }

        async function toggleMicStreaming() {
            try {
                if (isMicStreaming) {
                    stopMicStreaming();
                } else {
                    await startMicStreaming();
                }
            } catch (err) {
                appendMessage('System', `Error: ${err.message}`);
                stopMicStreaming();
            }
        }

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            const isUser = sender === 'User';
            div.className = `p-3 rounded-lg text-sm ${isUser ? 'bg-gray-700 ml-8 border border-gray-600' : 'bg-blue-900/30 mr-8 border border-blue-800'}`;
            div.innerHTML = `<strong class="${isUser ? 'text-gray-300' : 'text-blue-400'}">${sender}:</strong> <span class="text-gray-100">${text}</span>`;
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            const useLLM = document.getElementById('llm-toggle').checked;
            
            appendMessage('User', text);
            userInput.value = '';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({text: text, use_llm: useLLM})
                });
                
                const data = await response.json();
                
                // 1. Catch Flask 500 errors so they don't fail silently
                if (!response.ok) {
                    throw new Error(data.error || `HTTP ${response.status} from server`);
                }

                appendMessage('Atlas', data.response);

                // 2. Update Image safely (checks if elements exist first)
                if(data.image_updated) {
                    if (gameRender) {
                        gameRender.src = `/latest_image?t=${new Date().getTime()}`;
                        gameRender.classList.remove('hidden');
                    }
                    if (noRenderText) {
                        noRenderText.classList.add('hidden');
                    }
                }

                // 3. Update Timers safely (checks if state exists)
                if (data.state && data.state.active_timers) {
                    updateTimers(data.state.active_timers);
                }

                if (data.intent === "weather" && data.success && data.data) {
                    const weatherData = data.data;
                    const iconElement = document.getElementById('weather-icon');
                    const weatherBox = document.getElementById('weather-box');

                    if (weatherBox && weatherData.theme) {
                        const baseClasses = "flex-1 rounded flex flex-col items-center justify-evenly border p-4 transition-all duration-700";
                        weatherBox.className = `${baseClasses} ${weatherData.theme}`;
                    }

                    if (iconElement && weatherData.icon && weatherData.theme) {
                        const colorMatch = weatherData.theme.match(/text-\w+-\d+/);
                        iconElement.setAttribute('data-feather', weatherData.icon);
                        if (colorMatch) iconElement.className = `w-20 h-20 ${colorMatch[0]}`;
                        iconElement.setAttribute('data-feather', weatherData.icon);
                    }

                    const descElement = document.getElementById('weather-desc');
                    if (descElement) {
                        descElement.innerText = `${weatherData.weather_condition} | ${weatherData.temperature}${weatherData.temperature_unit}`;
                    }

                    const locElement = document.getElementById('weather-location');
                    if (locElement) {
                        locElement.innerText = `${weatherData.city}, ${weatherData.country}`;
                    }

                    renderFeatherIcons();
                }

            } catch (error) {
                console.error("Chat error:", error); // Logs full details to the browser developer console
                appendMessage('System', `Error: ${error.message}`);
            }
        }

        function updateTimers(timers) {
            activeTimers = timers; // Store the new state from the backend
            renderTimerUI();
        }

        function renderTimerUI() {
            const timerList = document.getElementById('timer-list');
            if (!activeTimers || activeTimers.length === 0) {
                timerList.innerHTML = "No active timers.";
                return;
            }

            const now = Math.floor(Date.now() / 1000); // Current time in seconds

            timerList.innerHTML = activeTimers.map(t => {
                const remaining = Math.max(0, Math.floor(t.end_time - now));
                
                // Format seconds into MM:SS
                const mins = Math.floor(remaining / 60);
                const secs = (remaining % 60).toString().padStart(2, '0');
                
                const isDone = remaining === 0;
                const displayTime = isDone ? "DONE!" : `${mins}:${secs}`;
                const colorClass = isDone ? "text-green-400 font-bold" : "text-yellow-400";

                return `
                    <div class="flex justify-between border-b border-gray-700 py-1">
                        <span class="text-gray-300">${t.timername || t.name || 'Timer'}</span>
                        <span class="${colorClass}">${displayTime}</span>
                    </div>
                `;
            }).join('');
        }
        setInterval(renderTimerUI, 1000);

        renderFeatherIcons();
        setListeningState(false);
    </script>
</body>
</html>
